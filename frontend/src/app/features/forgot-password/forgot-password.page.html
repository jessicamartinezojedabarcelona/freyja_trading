<app-auth-shell
  heading="¿Olvidaste tu contraseña?"
  subtitle="Te enviaremos un enlace para restablecerla."
>
  @if (submitted()) {
    <p class="success" role="status">
      Si el correo existe, se enviará un enlace de restablecimiento.
    </p>
  } @else {
    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="field">
        <label for="email">Correo</label>
        <input
          id="email"
          #emailInput
          type="email"
          formControlName="email"
          autocomplete="email"
          [attr.aria-invalid]="emailError() ? 'true' : null"
          [attr.aria-describedby]="emailError() ? 'email-error' : null"
        />
        @if (emailError(); as message) {
          <p id="email-error" class="field-error">{{ message }}</p>
        }
      </div>

      <button type="submit" [disabled]="submitting()">
        {{ submitting() ? 'Enviando…' : 'Enviar enlace' }}
      </button>
    </form>
  }

  <p below-card><a routerLink="/login">Volver a iniciar sesión</a></p>
</app-auth-shell>
